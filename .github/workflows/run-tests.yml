name: Tests

on:
  workflow_call:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']
        laravel: ['^13.0']
        include:
          - laravel: '^13.0'
            testbench: '^11.0'
        include:
          - laravel: '^12.0'
            testbench: '^10.0'
          - laravel: '^13.0'
            testbench: '^11.0'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, curl, dom
          coverage: none

      - name: Constrain Laravel version
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" --no-update --no-interaction
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - run: composer update --prefer-dist --no-interaction --with-all-dependencies

      - run: composer test:unit
